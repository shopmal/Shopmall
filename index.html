<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Mall</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}
.container{
    max-width:400px;
    margin:auto;
    padding:20px;
}
.logo{
    text-align:center;
    margin-top:40px;
}
.logo img{
    width:100px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}
label{
    font-size:14px;
    color:#94a3b8;
}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    margin-top:5px;
    margin-bottom:15px;
}
button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#22c55e;
    color:white;
    font-weight:bold;
    margin-top:10px;
}
.secondary{
    background:#475569;
}
.erro{
    color:#f87171;
    margin-top:10px;
    font-size:14px;
}
.sucesso{
    color:#22c55e;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAzkSpazn_jhPYPZZhaFmOY05MoVfhJXuQ",
  authDomain: "shopmal-7a1c9.firebaseapp.com",
  projectId: "shopmal-7a1c9",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ===== TELA LOGIN =====
function renderLogin(){
app.innerHTML = `
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/891/891462.png">
<h2>Shop Mall</h2>
</div>

<div class="card">
<h3>Entrar</h3>

<label>📧 Email ou 📱 Telefone</label>
<input id="loginEmail" placeholder="Digite seu email ou telefone">

<label>🔒 Senha</label>
<input id="loginSenha" type="password" placeholder="Digite sua senha">

<button onclick="login()">Entrar</button>
<button class="secondary" onclick="renderRegister()">Criar conta</button>

<div id="loginErro" class="erro"></div>
</div>
`;
}

// ===== TELA CADASTRO =====
function renderRegister(){
app.innerHTML = `
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/891/891462.png">
<h2>Shop Mall</h2>
</div>

<div class="card">
<h3>Cadastrar</h3>

<label>📧 Email ou 📱 Telefone</label>
<input id="regEmail" placeholder="Digite email ou telefone">

<label>🔒 Senha (mínimo 6)</label>
<input id="regSenha" type="password">

<button onclick="register()">Cadastrar</button>
<button class="secondary" onclick="renderLogin()">Voltar</button>

<div id="regErro" class="erro"></div>
<div id="regSucesso" class="sucesso"></div>
</div>
`;
}

// ===== CADASTRO =====
function register(){
let email = document.getElementById("regEmail").value.trim();
const senha = document.getElementById("regSenha").value;

// Se for telefone → transforma em email fake
if(/^\d+$/.test(email)){
    email = email + "@shopmall.com";
}

// validação
if(!email.includes("@")){
    return showErro("regErro","Digite um email válido ou telefone");
}

if(senha.length < 6){
    return showErro("regErro","A senha deve ter no mínimo 6 caracteres");
}

auth.createUserWithEmailAndPassword(email, senha)
.then(()=>{
    document.getElementById("regSucesso").innerText = "Conta criada com sucesso!";
    document.getElementById("regErro").innerText = "";
})
.catch(e=>{
    showErro("regErro", traduzErro(e.code));
});
}

// ===== LOGIN =====
function login(){
let email = document.getElementById("loginEmail").value.trim();
const senha = document.getElementById("loginSenha").value;

// telefone → vira email
if(/^\d+$/.test(email)){
    email = email + "@shopmall.com";
}

auth.signInWithEmailAndPassword(email, senha)
.then(()=>{
    alert("Login realizado com sucesso!");
})
.catch(e=>{
    showErro("loginErro", traduzErro(e.code));
});
}

// ===== TRADUÇÃO DE ERROS =====
function traduzErro(code){
switch(code){
    case "auth/invalid-email":
        return "Email inválido";
    case "auth/user-not-found":
        return "Usuário não encontrado";
    case "auth/wrong-password":
        return "Senha incorreta";
    case "auth/email-already-in-use":
        return "Email já cadastrado";
    case "auth/weak-password":
        return "Senha muito fraca";
    default:
        return "Erro: " + code;
}
}

// ===== MOSTRAR ERRO =====
function showErro(id, msg){
document.getElementById(id).innerText = msg;
}

// INIT
renderLogin();
</script>

</body>
</html>
